<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS Store Online - Boutique Officielle</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com"></script>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h2 style="color: #ff8c00; font-size: 2rem;">PS STORE</h2>
        <ul>
            <li onclick="scrollToCat('vetements')">Vêtements</li>
            <li onclick="scrollToCat('sous-vetements')">Sous-vêtements</li>
            <li onclick="scrollToCat('chaussures')">Chaussures</li>
            <li onclick="scrollToCat('electronique')">Appareils Électroniques</li>
        </ul>
    </div>

    <nav>
        <div class="nav-left">
            <!-- BOUTON MENU AGRANDI -->
            <button class="menu-toggle" onclick="toggleMenu()">
                <i data-lucide="menu" style="width: 35px; height: 35px;"></i>
            </button>
            <h1 class="logo">PS STORE <span class="sub-logo">ONLINE</span></h1>
        </div>

        <div class="search-container">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" placeholder="Rechercher un article..." id="searchInput">
        </div>

        <!-- BOUTON PANIER BIEN VISIBLE -->
        <div class="cart-wrapper" onclick="window.location.href='panier.html'">
            <div class="cart-icon-box">
                <i data-lucide="shopping-cart" style="width: 30px; height: 30px;"></i>
                <span id="cart-badge">0</span>
            </div>
            <span class="cart-text">Mon Panier</span>
        </div>
    </nav>

    <div id="shop-content"></div>

    <script>
        // CONFIGURATION PRIX (Exemple pour les premiers articles)
        const configProduits = [
            { id: 1, name: "Chemise Luxe", price: "75.000" },
            { id: 151, name: "Boxer Premium", price: "25.000" },
            { id: 301, name: "Baskets Sport", price: "150.000" },
            { id: 451, name: "Smart TV 4K", price: "4.500.000" }
        ];

        let panier = JSON.parse(localStorage.getItem('panier')) || [];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function scrollToCat(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
            toggleMenu();
        }

        function initShop() {
            const categories = [
                { id: "vetements", label: "Vêtements", start: 1 },
                { id: "sous-vetements", label: "Sous-vêtements", start: 151 },
                { id: "chaussures", label: "Chaussures", start: 301 },
                { id: "electronique", label: "Appareils Électroniques", start: 451 }
            ];

            const container = document.getElementById('shop-content');
            
            categories.forEach(cat => {
                let section = document.createElement('section');
                section.className = 'category-row';
                section.id = cat.id;

                let html = `<div class="row-header"><h2>${cat.label}</h2><button class="btn-view-all">Voir les 150 articles</button></div><div class="product-scroll">`;

                for(let i = 0; i < 150; i++) {
                    let currentId = cat.start + i;
                    let info = configProduits.find(p => p.id === currentId) || { name: `Article #${currentId}`, price: "0" };
                    
                    html += `
                        <div class="card">
                            <div class="img-placeholder">ESPACE IMAGE #${currentId}</div>
                            <div class="info">
                                <h3>${info.name}</h3>
                                <p class="price">${info.price} GNF</p>
                                <div class="btn-grid">
                                    <button class="btn-secondary">Détails</button>
                                    <button class="btn-secondary">Couleurs</button>
                                    <button class="btn-main" onclick="ajouterAuPanier('${info.name}', '${info.price}')">Ajouter au panier</button>
                                </div>
                            </div>
                        </div>`;
                }
                html += `</div>`;
                section.innerHTML = html;
                container.appendChild(section);
            });
            lucide.createIcons();
            updateBadge();
        }

        function ajouterAuPanier(nom, prix) {
            panier.push({ name: nom, price: prix });
            localStorage.setItem('panier', JSON.stringify(panier));
            updateBadge();
            const b = document.getElementById('cart-badge');
            b.style.transform = "scale(1.5)";
            setTimeout(() => b.style.transform = "scale(1)", 300);
        }

        function updateBadge() {
            document.getElementById('cart-badge').innerText = panier.length;
        }

        window.onload = initShop;
    </script>
</body>
</html>
